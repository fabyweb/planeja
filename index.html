<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — Gestão Pessoal</title>
<meta name="version" content="1781100010">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0A0F; --surface:#111118; --card:#16161E; --card-hover:#1C1C27;
  --border:#2A2A38; --border-soft:#1E1E2A;
  --text:#E4E4F0; --text-muted:#7878A0; --text-dim:#4A4A68;
  --violet:#7C3AED; --violet-light:#A78BFA; --violet-glow:rgba(124,58,237,0.18);
  --amber:#F59E0B; --amber-light:#FCD34D;
  --green:#10B981; --red:#EF4444; --blue:#3B82F6; --cyan:#06B6D4;
  --sidebar-w:68px; --topbar-h:56px; --bottom-h:60px;
  --radius:12px; --radius-sm:8px; --radius-xs:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── LAYOUT ── */
.app-shell{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border-soft);display:flex;flex-direction:column;align-items:center;padding:14px 0 16px;gap:4px;z-index:100;flex-shrink:0;transition:width 0.2s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── SIDEBAR ── */
.sidebar-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--violet),#9F67FF);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.nav-group{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;padding:0 10px}
.nav-btn{width:44px;height:44px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;position:relative;font-size:18px;flex-shrink:0}
.nav-btn:hover{background:var(--card);color:var(--text)}
.nav-btn.active{background:var(--violet-glow);color:var(--violet-light)}
.nav-btn .badge{position:absolute;top:6px;right:5px;width:15px;height:15px;background:var(--violet);border-radius:50%;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
.nav-divider{width:26px;height:1px;background:var(--border-soft);margin:6px 0}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 10px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#F59E0B,#EC4899);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border-soft);gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600}
.topbar-sub{font-size:13px;color:var(--text-muted)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{display:none;height:var(--bottom-h);background:var(--surface);border-top:1px solid var(--border-soft);align-items:center;justify-content:space-around;padding:0 4px;flex-shrink:0;z-index:100;overflow-x:auto}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:var(--radius-sm);transition:all 0.15s;font-size:20px;position:relative}
.bnav-btn span{font-size:9px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase}
.bnav-btn.active{color:var(--violet-light);background:var(--violet-glow)}
.bnav-btn .badge{position:absolute;top:4px;right:8px;width:14px;height:14px;background:var(--violet);border-radius:50%;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.view{display:none;animation:fadeUp 0.18s ease}
.view.active{display:block;min-height:calc(100vh - 120px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius-xs);border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card);color:var(--text)}
.btn-primary{background:var(--violet);color:#fff}
.btn-primary:hover{background:#6D28D9}
.btn-danger{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:fadeUp 0.2s ease}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:10px}
.modal-title{font-size:15px;font-weight:600;flex:1}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.modal-close:hover{background:var(--card);color:var(--text)}
.modal-body{padding:18px 20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border-soft);display:flex;gap:8px;justify-content:flex-end}

/* ── FORM ── */
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xs);padding:9px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--violet)}
.form-select{appearance:none;cursor:pointer}
.form-select option{background:var(--card)}
.form-textarea{resize:vertical;min-height:72px;line-height:1.5}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text-dim);margin-top:4px}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em}
.count-pill{padding:2px 7px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text-muted);font-family:'JetBrains Mono',monospace}

/* ═══════════════════════════
   INBOX
═══════════════════════════ */
.inbox-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;position:relative;overflow:hidden}
.inbox-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,var(--violet-glow) 0%,transparent 70%);pointer-events:none}
.inbox-label{font-size:10px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--violet-light);margin-bottom:10px}
.inbox-input{width:100%;background:transparent;border:none;outline:none;font-size:20px;font-weight:400;color:var(--text);font-family:'Inter',sans-serif;line-height:1.5;resize:none;min-height:64px}
.inbox-input::placeholder{color:var(--text-dim)}
.inbox-toolbar{display:flex;align-items:center;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);flex-wrap:wrap}
.tool-btn{width:30px;height:30px;border-radius:var(--radius-xs);border:none;background:var(--surface);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s}
.tool-btn:hover{background:var(--card-hover);color:var(--text)}
.tool-btn.recording{color:var(--red);background:rgba(239,68,68,0.1);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.inbox-hint{font-size:11px;color:var(--text-dim)}

/* backlog list */
.backlog-list{display:flex;flex-direction:column;gap:6px}
.backlog-item{background:var(--card);border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:11px 13px;display:flex;align-items:flex-start;gap:10px;transition:background 0.15s;position:relative}
.backlog-item:hover{background:var(--card-hover)}
.item-text{flex:1;font-size:13px;color:var(--text);line-height:1.4;word-break:break-word}
.item-meta{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;padding-top:2px}
.item-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.backlog-item-wrap{display:flex;flex-direction:column}
.backlog-item-top{display:flex;align-items:flex-start;gap:10px}
.action-chip{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all 0.12s;white-space:nowrap;font-family:'Inter',sans-serif}
.action-chip:hover{background:var(--card-hover);color:var(--text)}
.action-chip.task{border-color:var(--violet);color:var(--violet-light)}
.action-chip.event{border-color:var(--cyan);color:var(--cyan)}
.action-chip.fin{border-color:var(--amber);color:var(--amber)}
.action-chip.list{border-color:var(--green);color:#34D399}
.action-chip.del{border-color:rgba(239,68,68,0.4);color:var(--red)}

/* ═══════════════════════════
   KANBAN
═══════════════════════════ */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.kanban-col{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.col-header{padding:12px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border-soft)}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-name{font-size:12px;font-weight:600;color:var(--text);flex:1}
.col-count{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;background:var(--bg);padding:2px 6px;border-radius:4px}
.col-cards{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:80px}
.k-card{background:var(--card);border:1px solid var(--border-soft);border-left:3px solid var(--violet);border-radius:var(--radius-sm);padding:11px;cursor:grab;transition:all 0.15s;position:relative}
.k-card:hover{background:var(--card-hover);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.3)}
.k-card.dragging{opacity:0.4;cursor:grabbing}
.k-card.col-amber{border-left-color:var(--amber)}
.k-card.col-green{border-left-color:var(--green)}
.k-card.col-blue{border-left-color:var(--blue)}
.k-card.col-red{border-left-color:var(--red)}
.k-card.col-cyan{border-left-color:var(--cyan)}
.k-card.col-gray{border-left-color:var(--text-dim);opacity:0.6}
.k-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4}
.k-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.k-tag{padding:2px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.k-tag.violet{background:rgba(124,58,237,0.2);color:var(--violet-light)}
.k-tag.amber{background:rgba(245,158,11,0.15);color:var(--amber-light)}
.k-tag.green{background:rgba(16,185,129,0.15);color:#34D399}
.k-tag.cyan{background:rgba(6,182,212,0.15);color:#22D3EE}
.k-footer{display:flex;align-items:center;gap:6px}
.k-due{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.k-due.urgent{color:var(--red)}
.k-due.soon{color:var(--amber)}
.k-progress{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.k-progress-bar{width:34px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.k-progress-fill{height:100%;border-radius:2px}
.col-drop-zone{min-height:4px;border-radius:4px;transition:all 0.15s}
.col-drop-zone.drag-over{min-height:40px;background:var(--violet-glow);border:1px dashed var(--violet)}
.col-add-btn{width:100%;padding:8px;border-radius:var(--radius-xs);border:1px dashed var(--border);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;margin:8px}
.col-add-btn:hover{border-color:var(--violet);color:var(--violet-light);background:var(--violet-glow)}

/* Gantt */
.gantt-wrap{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;margin-top:16px}
.gantt-header{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border-soft);gap:10px;flex-wrap:wrap}
.gantt-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;flex:1}
.gantt-scale-btns{display:flex;gap:3px}
.scale-btn{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.12s;font-family:'Inter',sans-serif}
.scale-btn:hover{background:var(--card);color:var(--text)}
.scale-btn.active{background:var(--violet-glow);border-color:var(--violet);color:var(--violet-light)}
.gantt-body{padding:14px 18px;overflow-x:auto}
.gantt-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.gantt-row-name{font-size:11px;color:var(--text-muted);min-width:140px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-track{flex:1;height:24px;background:var(--bg);border-radius:4px;position:relative;overflow:visible;min-width:200px}
.gantt-bar{position:absolute;height:100%;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;transition:filter 0.15s}
.gantt-bar:hover{filter:brightness(1.2)}

/* ═══════════════════════════
   CALENDÁRIO
═══════════════════════════ */
.calendar-layout{display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start}
.cal-main{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden}
.cal-nav{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-soft)}
.cal-month{font-size:15px;font-weight:600;flex:1}
.cal-arrow{width:28px;height:28px;border-radius:var(--radius-xs);border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.12s}
.cal-arrow:hover{background:var(--card);color:var(--text)}
.cal-grid-head{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 14px 0}
.cal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;padding-bottom:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 14px 14px;gap:2px}
.cal-cell{border-radius:var(--radius-xs);display:flex;flex-direction:column;align-items:center;padding:4px 2px 3px;cursor:pointer;transition:all 0.12s;min-height:46px;gap:2px}
.cal-cell:hover{background:var(--card)}
.cal-cell.today .cal-day-num{background:var(--violet);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cal-cell.other-month .cal-day-num{color:var(--text-dim)}
.cal-day-num{font-size:11px;font-weight:500;color:var(--text);line-height:1}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:4px;height:4px;border-radius:50%}
.event-list{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:14px}
.event-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft)}
.event-item:last-child{border-bottom:none}
.event-time-col{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:36px}
.event-time{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-weight:500}
.event-bar{width:3px;flex:1;border-radius:2px;min-height:16px}
.event-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.event-detail{font-size:10px;color:var(--text-muted)}

/* ═══════════════════════════
   FINANCEIRO
═══════════════════════════ */
.fin-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.fin-card{background:var(--card);border:1px solid var(--border-soft);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.fin-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.fin-card.saldo::after{background:var(--green)}
.fin-card.entrada::after{background:var(--cyan)}
.fin-card.saida::after{background:var(--red)}
.fin-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:8px}
.fin-value{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace;line-height:1}
.fin-card.saldo .fin-value{color:var(--green)}
.fin-card.entrada .fin-value{color:var(--cyan)}
.fin-card.saida .fin-value{color:var(--red)}
.fin-delta{font-size:10px;color:var(--text-dim);margin-top:5px;font-family:'JetBrains Mono',monospace}
.fin-layout{display:grid;grid-template-columns:1fr 280px;gap:14px}
.fin-transactions{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden}
.table-header{display:grid;grid-template-columns:1fr 80px 80px 70px;padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border-soft)}
.th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim)}
.th.right{text-align:right}
.tx-row{display:grid;grid-template-columns:1fr 80px 80px 70px;padding:10px 14px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background 0.12s;align-items:center}
.tx-row:hover{background:var(--card)}
.tx-row:last-child{border-bottom:none}
.tx-name{font-size:12px;color:var(--text);font-weight:500}
.tx-cat{font-size:10px;color:var(--text-dim);margin-top:2px}
.tx-date{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.tx-method{font-size:10px;color:var(--text-dim);padding:2px 6px;border-radius:4px;background:var(--card);text-align:center;width:fit-content}
.tx-amount{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:right}
.tx-amount.pos{color:var(--green)}
.tx-amount.neg{color:var(--red)}
.fin-cats{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:14px}
.cat-item{margin-bottom:12px}
.cat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.cat-name{font-size:11px;color:var(--text-muted)}
.cat-val{font-size:11px;color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500}
.cat-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease}

/* ═══════════════════════════
   LISTAS
═══════════════════════════ */
.lists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.list-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden}
.list-head{padding:12px 14px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:8px}
.list-icon{width:26px;height:26px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:13px}
.list-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.list-count{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.list-items{padding:6px 0}
.list-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;transition:background 0.12s;user-select:none}
.list-item:hover{background:var(--card)}
.check-box{width:15px;height:15px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;font-size:9px}
.list-item.done .check-box{background:var(--green);border-color:var(--green);color:#fff}
.list-item-text{font-size:12px;color:var(--text);flex:1;word-break:break-word}
.list-item.done .list-item-text{color:var(--text-dim);text-decoration:line-through}
.list-item-tag{font-size:9px;padding:2px 5px;border-radius:3px;background:var(--bg);color:var(--text-dim);border:1px solid var(--border-soft);white-space:nowrap;flex-shrink:0}
.list-footer{padding:8px 14px;border-top:1px solid var(--border-soft)}
.list-add-input{width:100%;background:transparent;border:none;outline:none;font-size:12px;color:var(--text-muted);font-family:'Inter',sans-serif}
.list-add-input::placeholder{color:var(--text-dim)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:20px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;font-family:'Inter',sans-serif;box-shadow:0 8px 24px rgba(0,0,0,0.5);animation:fadeUp 0.2s ease;z-index:1000;max-width:280px}

/* ── SEARCH BAR ── */
.search-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.5);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity 0.15s}
.search-overlay.open{opacity:1;pointer-events:all}
.search-box{position:fixed;top:60px;left:50%;transform:translateX(-50%);width:min(600px,92vw);z-index:401;animation:fadeUp 0.18s ease}
.search-input-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--violet);border-radius:var(--radius);padding:10px 16px;box-shadow:0 16px 48px rgba(0,0,0,0.6)}
.search-input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:var(--text);font-family:'Inter',sans-serif}
.search-input::placeholder{color:var(--text-dim)}
.search-results{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:6px;overflow:hidden;max-height:60vh;overflow-y:auto}
.search-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);padding:10px 16px 4px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.12s}
.search-result-item:hover{background:var(--card)}
.search-result-icon{font-size:14px;flex-shrink:0}
.search-result-text{flex:1;font-size:13px;color:var(--text)}
.search-result-meta{font-size:11px;color:var(--text-dim);white-space:nowrap}
.search-result-match{background:rgba(124,58,237,0.25);color:var(--violet-light);border-radius:2px;padding:0 2px}
.search-empty{padding:24px;text-align:center;color:var(--text-dim);font-size:13px}

/* ── FILTER PANEL ── */
.filter-panel{background:var(--surface);border-bottom:1px solid var(--border-soft);padding:10px 20px;display:none;gap:10px;flex-wrap:wrap;align-items:center}
.filter-panel.open{display:flex}
.filter-chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.12s;font-family:'Inter',sans-serif;white-space:nowrap}
.filter-chip:hover{border-color:var(--violet);color:var(--violet-light)}
.filter-chip.active{background:var(--violet-glow);border-color:var(--violet);color:var(--violet-light)}
.filter-chip.clear{border-color:rgba(239,68,68,0.4);color:var(--red)}
.filter-chip.clear:hover{background:rgba(239,68,68,0.1)}
.filter-separator{width:1px;height:18px;background:var(--border);flex-shrink:0}

/* ── TAG INPUT ── */
.tag-input-wrap{position:relative}
.tag-autocomplete{position:absolute;bottom:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);min-width:180px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.tag-ac-item{padding:8px 12px;font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px}
.tag-ac-item:hover{background:var(--card-hover)}
.tag-ac-item .tag-color{width:8px;height:8px;border-radius:50%}

/* ── VOICE ENHANCED ── */
.voice-interim{font-size:13px;color:var(--text-dim);font-style:italic;padding:4px 0;min-height:20px;transition:all 0.2s}

/* ── ACTIVE FILTERS BAR ── */
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.active-filter-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--violet-glow);border:1px solid var(--violet);color:var(--violet-light)}
.active-filter-pill button{background:none;border:none;color:inherit;cursor:pointer;font-size:12px;padding:0;line-height:1}

/* ── SEARCH HIGHLIGHT ── */
.hl{background:rgba(124,58,237,0.25);color:var(--violet-light);border-radius:2px;padding:0 1px}

/* ── SVG ICONS ── */
.ico{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{width:100%;height:100%;display:block}


/* ── GOOGLE CALENDAR ── */
.gcal-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap}
.gcal-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.gcal-status.connected{border-color:var(--green);color:var(--green);background:rgba(16,185,129,0.1)}
.gcal-status.disconnected{border-color:var(--border);color:var(--text-dim)}
.gcal-status.loading{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,0.1)}
.gcal-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.gcal-event{border-left:3px solid var(--blue);padding-left:8px;margin-left:2px}
.gcal-event .event-name{color:#93C5FD}
.gcal-spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--amber);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.gcal-config-input{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px 10px;font-size:12px;color:var(--text);font-family:monospace;outline:none}
.gcal-config-input:focus{border-color:var(--violet)}

/* ══ NOTAS (Keep-style) ══ */
.notes-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.notes-search{flex:1;min-width:160px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none}
.notes-search:focus{border-color:var(--violet)}
.notes-search::placeholder{color:var(--text-dim)}
.notes-folders{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.folder-chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.12s;font-family:'Inter',sans-serif;white-space:nowrap}
.folder-chip:hover{border-color:var(--violet);color:var(--violet-light)}
.folder-chip.active{background:var(--violet-glow);border-color:var(--violet);color:var(--violet-light)}
.notes-masonry{columns:3;column-gap:14px}
.note-card{break-inside:avoid;margin-bottom:14px;border-radius:var(--radius);border:1px solid var(--border-soft);padding:14px;cursor:pointer;transition:all 0.15s;position:relative;display:inline-block;width:100%}
.note-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.35);border-color:var(--border)}
.note-card.pinned{border-top:2px solid var(--amber)}
.note-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.note-title{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.4;word-break:break-word}
.note-pin{font-size:14px;cursor:pointer;opacity:0.5;transition:opacity 0.12s;flex-shrink:0;background:none;border:none;color:var(--amber);padding:0}
.note-pin:hover,.note-card.pinned .note-pin{opacity:1}
.note-body{font-size:12px;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow:hidden;mask-image:linear-gradient(to bottom,black 80%,transparent 100%)}
.note-body.expanded{max-height:none;mask-image:none}
.note-checklist{list-style:none;padding:0;margin:0}
.note-checklist li{display:flex;align-items:flex-start;gap:7px;padding:3px 0;font-size:12px;color:var(--text-muted)}
.note-checklist li.done{color:var(--text-dim);text-decoration:line-through}
.note-checklist li input[type=checkbox]{accent-color:var(--violet);flex-shrink:0;margin-top:2px;cursor:pointer}
.note-image{width:100%;border-radius:var(--radius-xs);margin-bottom:8px;object-fit:cover;max-height:160px;display:block}
.note-footer{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.note-tag{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;background:var(--surface);border:1px solid var(--border-soft);color:var(--text-dim);cursor:pointer}
.note-tag:hover{border-color:var(--violet);color:var(--violet-light)}
.note-folder{font-size:10px;color:var(--text-dim);margin-left:auto;font-style:italic}
.note-actions{display:none;position:absolute;bottom:10px;right:10px;gap:4px}
.note-card:hover .note-actions{display:flex}
.note-action-btn{width:26px;height:26px;border-radius:5px;border:none;background:var(--surface);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.12s}
.note-action-btn:hover{background:var(--card-hover);color:var(--text)}
.note-new-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:20px;cursor:text}
.note-new-title{width:100%;background:transparent;border:none;outline:none;font-size:14px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif;margin-bottom:6px}
.note-new-title::placeholder{color:var(--text-dim)}
.note-new-body{width:100%;background:transparent;border:none;outline:none;font-size:13px;color:var(--text-muted);font-family:'Inter',sans-serif;resize:none;min-height:40px;line-height:1.5}
.note-new-body::placeholder{color:var(--text-dim)}
.note-new-toolbar{display:flex;align-items:center;gap:6px;margin-top:10px;border-top:1px solid var(--border-soft);padding-top:10px;flex-wrap:wrap}
.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.12s;flex-shrink:0}
.color-dot:hover,.color-dot.active{transform:scale(1.25);border-color:rgba(255,255,255,0.5)}
.pinned-section{margin-bottom:4px}
.notes-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:10px;padding-left:2px}
@media(max-width:900px){.notes-masonry{columns:2}}
@media(max-width:540px){.notes-masonry{columns:1}}

/* ══ ESTUDOS ══ */
.estudos-grid{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
.estudos-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden}
.estudos-card-header{padding:14px 16px 12px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:10px}
.estudos-card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);flex:1}
.estudos-card-body{padding:14px 16px}

/* Meta diária */
.meta-ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.meta-ring{position:relative;width:72px;height:72px;flex-shrink:0}
.meta-ring svg{transform:rotate(-90deg)}
.meta-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
.meta-ring-val{font-size:13px;font-weight:700;color:var(--text)}
.meta-ring-sub{font-size:9px;color:var(--text-dim)}
.streak-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:rgba(245,158,11,0.15);border:1px solid var(--amber);font-size:12px;font-weight:700;color:var(--amber)}

/* Timer */
.timer-display{font-size:40px;font-weight:300;font-family:'JetBrains Mono',monospace;color:var(--text);text-align:center;letter-spacing:2px;margin:10px 0}
.timer-subject{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:12px;min-height:18px}
.timer-btns{display:flex;gap:8px;justify-content:center}
.timer-btn{padding:8px 20px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif}
.timer-btn.start{background:var(--green);color:#fff}
.timer-btn.start:hover{background:#0ea572}
.timer-btn.pause{background:var(--amber);color:#000}
.timer-btn.stop{background:var(--red);color:#fff}
.timer-btn.stop:hover{background:#dc2626}
.timer-running{animation:timerPulse 2s ease-in-out infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.7}}

/* Semana Gurujá */
.semana-dias{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.dia-pill{padding:4px;border-radius:var(--radius-xs);text-align:center;cursor:pointer;border:1px solid var(--border-soft);transition:all 0.12s;font-size:10px;font-weight:700;color:var(--text-muted)}
.dia-pill:hover{border-color:var(--violet);color:var(--violet-light)}
.dia-pill.active{background:var(--violet-glow);border-color:var(--violet);color:var(--violet-light)}
.dia-pill.today{background:rgba(16,185,129,0.15);border-color:var(--green);color:var(--green)}
.dia-pill.today.active{background:var(--violet-glow);border-color:var(--violet);color:var(--violet-light)}
.atividade-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background 0.12s}
.atividade-item:last-child{border-bottom:none}
.atividade-item:hover{background:var(--card)}
.ativ-check{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.12s;font-size:10px}
.atividade-item.done .ativ-check{background:var(--green);border-color:var(--green);color:#fff}
.atividade-item.done .ativ-title{color:var(--text-dim);text-decoration:line-through}
.ativ-info{flex:1;min-width:0}
.ativ-title{font-size:13px;color:var(--text);line-height:1.4;word-break:break-word}
.ativ-meta{font-size:10px;color:var(--text-dim);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.ativ-tipo{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.ativ-tipo.leitura{background:rgba(59,130,246,0.15);color:var(--blue)}
.ativ-tipo.questoes{background:rgba(124,58,237,0.15);color:var(--violet-light)}
.ativ-tipo.resumo{background:rgba(16,185,129,0.15);color:var(--green)}
.ativ-tipo.revisao{background:rgba(245,158,11,0.15);color:var(--amber)}
.ativ-time{font-family:'JetBrains Mono',monospace}

/* Desempenho */
.disc-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.disc-name{font-size:11px;color:var(--text-muted);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.disc-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.disc-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.disc-pct{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);width:32px;text-align:right;flex-shrink:0}
.disc-q{font-size:10px;color:var(--text-dim);width:36px;text-align:right;flex-shrink:0}

/* Revisão espaçada */
.rev-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-soft);font-size:12px}
.rev-item:last-child{border-bottom:none}
.rev-badge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.rev-badge.hoje{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid var(--red)}
.rev-badge.amanha{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid var(--amber)}
.rev-badge.proxima{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid var(--green)}
.rev-tema{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rev-disc{font-size:10px;color:var(--text-dim)}

/* Horas por disciplina */
.horas-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}

@media(max-width:900px){.estudos-grid{grid-template-columns:1fr}}

/* ══ CURRÍCULO ══ */
.curriculo-layout{display:grid;grid-template-columns:220px 1fr;gap:12px;margin-top:8px}
.curriculo-sidebar{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow-y:auto}
.curriculo-sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:6px;flex-shrink:0}
.curriculo-main{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden}
.materia-list-panel{overflow-y:auto;padding:4px;max-height:60vh}
.mat-item{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.12s;margin-bottom:2px}
.mat-item:hover{background:var(--card)}
.mat-item.active{background:var(--violet-glow);border:1px solid var(--violet)}
.mat-item.active .mat-name{color:var(--violet-light)}
.mat-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.mat-prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.mat-prog-fill{height:100%;border-radius:2px;transition:width 0.4s}
.mat-pct{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;float:right;margin-top:-14px}
.curriculo-header{padding:14px 18px 12px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.curriculo-topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.cur-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.cur-prog-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.cur-prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:width 0.5s}
.cur-status-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.cur-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.cur-pill.green{background:rgba(16,185,129,0.12);border:1px solid var(--green);color:var(--green)}
.cur-pill.amber{background:rgba(245,158,11,0.12);border:1px solid var(--amber);color:var(--amber)}
.cur-pill.gray{background:rgba(120,120,160,0.1);border:1px solid var(--border);color:var(--text-dim)}
.cur-filter-bar{padding:8px 18px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.cur-filter-chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.12s;font-family:'Inter',sans-serif}
.cur-filter-chip:hover{border-color:var(--violet);color:var(--violet-light)}
.cur-filter-chip.active{background:var(--violet-glow);border-color:var(--violet);color:var(--violet-light)}
.topicos-area{overflow-y:auto;padding:12px 18px;max-height:60vh}
.topicos-grid-cur{display:flex;flex-direction:column;gap:6px}
.top-card{background:var(--card);border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:all 0.12s;position:relative}
.top-card:hover{background:var(--card-hover);border-color:var(--border)}
.top-card.estudado{border-left:3px solid var(--green)}
.top-card.andamento{border-left:3px solid var(--amber)}
.top-card.pendente{border-left:3px solid var(--border-soft)}
.top-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;transition:all 0.12s}
.top-card.estudado .top-check{background:var(--green);border-color:var(--green);color:#fff}
.top-card.andamento .top-check{background:rgba(245,158,11,0.2);border-color:var(--amber);color:var(--amber)}
.top-card.pendente .top-check{color:transparent}
.top-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
.top-card.pendente .top-name{color:var(--text-muted)}
.top-meta{font-size:10px;color:var(--text-dim);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.top-badge{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase}
.top-badge.estudado{background:rgba(16,185,129,0.15);color:var(--green)}
.top-badge.andamento{background:rgba(245,158,11,0.15);color:var(--amber)}
.top-badge.pendente{background:rgba(120,120,160,0.1);color:var(--text-dim)}
.top-hover-btns{position:absolute;top:6px;right:6px;display:none;gap:3px}
.top-card:hover .top-hover-btns{display:flex}
.top-hbtn{width:20px;height:20px;border-radius:3px;border:none;background:var(--surface);color:var(--text-muted);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.top-hbtn:hover{background:var(--card-hover);color:var(--text)}
/* Estudos tabs */
.estudos-tabs{display:flex;gap:0;border-bottom:1px solid var(--border-soft);margin-bottom:16px;flex-shrink:0}
.estudos-tab{padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.estudos-tab:hover{color:var(--text)}
.estudos-tab.active{color:var(--violet-light);border-bottom-color:var(--violet)}
@media(max-width:700px){.curriculo-layout{grid-template-columns:1fr;height:auto}.curriculo-sidebar{max-height:200px}}

/* ── FIREBASE ── */
.fb-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text-muted);background:transparent;font-family:'Inter',sans-serif;transition:all 0.15s}
.fb-status:hover{border-color:var(--violet);color:var(--violet-light)}
.fb-status.connected{background:rgba(16,185,129,0.1);border-color:var(--green);color:var(--green)}
.fb-status.saving{background:rgba(245,158,11,0.1);border-color:var(--amber);color:var(--amber)}
.fb-status.error{background:rgba(239,68,68,0.1);border-color:var(--red);color:var(--red)}



/* ── CLOUD SYNC ── */
.cloud-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--text-muted);background:transparent;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s}
.cloud-btn:hover{border-color:var(--violet);color:var(--violet-light)}
.cloud-btn.ok{background:rgba(16,185,129,0.1);border-color:var(--green);color:var(--green)}
.cloud-btn.busy{background:rgba(245,158,11,0.1);border-color:var(--amber);color:var(--amber)}
.cloud-btn.off{border-color:var(--border);color:var(--text-dim)}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ══════════════════════
   RESPONSIVE
══════════════════════ */
@media(max-width:900px){
  .kanban-board{grid-template-columns:repeat(2,1fr)}
  .fin-layout{grid-template-columns:1fr}
  .calendar-layout{grid-template-columns:1fr}

  .content{padding:14px}

  .form-grid{grid-template-columns:1fr}
}
@media(max-width:400px){

// ── Voice (Web Speech API) ──
let recognition = null;

function toggleVoice() {
  const btn = document.getElementById('voice-btn');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('❌ Reconhecimento de voz não suportado. Use Chrome ou Edge.');
    return;
  }
  if (recognition) {
    recognition.stop();
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;       // keeps listening
  recognition.interimResults = true;   // shows partial transcription

  const interim = document.getElementById('voice-interim');
  const inp     = document.getElementById('inbox-input');
  let finalText = inp.value;

  recognition.onstart = () => {
    btn.classList.add('recording');
    btn.textContent = '⏹';
    btn.title = 'Clique para parar';
    if (interim) interim.textContent = '🎙️ Ouvindo…';
  };

  recognition.onresult = e => {
    let interimStr = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalText += t + ' ';
        inp.value = finalText;
      } else {
        interimStr += t;
      }
    }
    if (interim) interim.textContent = interimStr ? '🎙️ ' + interimStr : '🎙️ Ouvindo…';
  };

  recognition.onerror = ev => {
    const msgs = {
      'not-allowed': '❌ Microfone negado — abra via HTTPS (GitHub Pages) ou localhost',
      'no-speech':   '⚠️ Nenhum áudio detectado',
      'network':     '❌ Erro de rede',
    };
    showToast(msgs[ev.error] || '❌ Erro: ' + ev.error);
    recognition = null;
    btn.classList.remove('recording');
    btn.innerHTML = '<span class="ico" style="width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span>';
    btn.title = 'Entrada por voz';
    if (interim) interim.textContent = '';
  };

  recognition.onend = () => {
    recognition = null;
    btn.classList.remove('recording');
    btn.innerHTML = '<span class="ico" style="width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span>';
    btn.title = 'Entrada por voz';
    if (interim) interim.textContent = '';
    if (inp.value.trim()) showToast('🎙️ Transcrição concluída');
  };

  recognition.start();
}

function renderKanban() {
  const board = document.getElementById('kanban-board');
  board.innerHTML = kanbanCols.map(col => {
    const allColTasks = filteredTasks(); const cards = allColTasks.filter(t => t.col === col.id);
    const today = new Date().toISOString().split('T')[0];
    return `
      <div class="kanban-col" id="col-${col.id}"
        ondragover="e=>e.preventDefault()" ondrop="dropCard(event,'${col.id}')">
        <div class="col-header">
          <div class="col-dot" style="background:${col.dotColor}"></div>
          <span class="col-name">${col.name}</span>
          <span class="col-count">${cards.length}</span>
        </div>
        <div class="col-cards" id="cards-${col.id}"
          ondragover="onDragOver(event)" ondrop="dropCard(event,'${col.id}')">
          ${cards.map(t => {
            const dueCls = t.due && t.due < today ? 'urgent' : (t.due && t.due <= addDays(today,3) ? 'soon' : '');
            const dueLabel = t.due ? fmtDate(t.due) : 'sem prazo';
            const fillColor = col.id==='done' ? 'var(--green)' : col.id==='review' ? 'var(--amber)' : 'var(--violet)';
            return `
            <div class="k-card col-${col.id==='done'?'gray':col.id==='review'?'amber':col.id==='doing'?'blue':''}
              ${t.priority==='urgente'?'col-red':''}"
              draggable="true"
              ondragstart="dragStart(event,${t.id})"
              onclick="editTask(${t.id})"
              title="${escHtml(t.notes||t.title)}">
              <div class="k-title">${escHtml(t.title)}</div>
              ${t.tag ? `<div class="k-tags"><span class="k-tag ${t.tagColor||'violet'}">${escHtml(t.tag)}</span>${t.priority!=='normal'?`<span class="k-tag amber">${t.priority}</span>`:''}</div>` : ''}
              <div class="k-footer">
                <span class="k-due ${dueCls}">${dueCls==='urgent'?'▲ ':dueCls==='soon'?'△ ':''}${dueLabel}</span>
                <div class="k-progress">
                  <div class="k-progress-bar"><div class="k-progress-fill" style="width:${t.progress}%;background:${fillColor}"></div></div>
                  ${t.progress}%
                </div>
              </div>
            </div>`;
          }).join('')}
          <div class="col-drop-zone" id="dz-${col.id}"></div>
        </div>
        <button class="col-add-btn" onclick="openTaskModal(null,null);document.getElementById('task-col').value='${col.id}'">+ Adicionar</button>
      </div>`;
  }).join('');
  renderGantt();
}

function dragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function dropCard(e, colId) {
  e.preventDefault();
  if (dragId === null) return;
  const task = tasks.find(t => t.id === dragId);
  if (task) { task.col = colId; if (colId==='done') task.progress=100; }
  dragId = null;
  renderKanban();
  showToast(`✅ Movido para ${kanbanCols.find(c=>c.id===colId)?.name}`);
}

function editTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('task-origin-id').value = '';
  document.getElementById('task-title').value = t.title;
  document.getElementById('task-tag').value = t.tag||'';
  document.getElementById('task-due').value = t.due||'';
  document.getElementById('task-priority').value = t.priority||'normal';
  updateTaskColSelect();
  document.getElementById('task-col').value = t.col;
  document.getElementById('task-notes').value = t.notes||'';
  document.getElementById('task-progress').value = t.progress||0;
  document.getElementById('task-progress-label').textContent = t.progress||0;
  document.querySelector('#modal-task .modal-title').textContent = 'Editar Tarefa';
  // Show delete button
  let delBtn = document.getElementById('task-delete-btn');
  if (!delBtn) {
    delBtn = document.createElement('button');
    delBtn.id = 'task-delete-btn';
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = '🗑️ Excluir';
    document.querySelector('#modal-task .modal-footer').prepend(delBtn);
  }
  delBtn.style.display = 'inline-flex';
  delBtn.onclick = () => {
    if (!confirm('Excluir esta tarefa?')) return;
    tasks = tasks.filter(x=>x.id!==id);
    closeModal('modal-task');
    resetTaskModal();
    renderKanban();
    showToast('🗑️ Tarefa excluída');
  };
  const saveBtn = document.querySelector('#modal-task .btn-primary');

//  GANTT
// ══════════════════════════════════════════
const ganttColors = ['#7C3AED','#3B82F6','#F59E0B','#06B6D4','#10B981','#EF4444'];
let ganttScale = 'semana'; // 'dia' | 'semana' | 'mes'

function setScale(btn, scale) {
  document.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ganttScale = scale;
  renderGantt();
}

function renderGantt() {
  const body = document.getElementById('gantt-body');
  const active = tasks.filter(t => t.due);
  if (!active.length) {
    body.innerHTML = '<p style="color:var(--text-dim);font-size:12px;padding:12px 0">Nenhuma tarefa com prazo.</p>';
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);

  // ── Window ──
  let winStart, winEnd;
  if (ganttScale === 'dia') {
    winStart = new Date(today); winStart.setDate(today.getDate() - 3);
    winEnd   = new Date(today); winEnd.setDate(today.getDate() + 11);
  } else if (ganttScale === 'semana') {
    winStart = new Date(today); winStart.setDate(today.getDate() - 7);
    winEnd   = new Date(today); winEnd.setDate(today.getDate() + 35);
  } else {
    winStart = new Date(today); winStart.setDate(1); winStart.setMonth(winStart.getMonth()-1);
    winEnd   = new Date(today); winEnd.setMonth(winEnd.getMonth()+4); winEnd.setDate(0);
  }
  const totalMs = winEnd - winStart || 1;

  // ── Helper: date → % of timeline ──
  function pct(date) {
    return Math.max(0, Math.min(100, (date - winStart) / totalMs * 100));
  }

  const todayP = pct(today);

  // ── Ticks ──
  const tickStep = ganttScale === 'dia' ? 1 : ganttScale === 'semana' ? 7 : 30;
  const ticks = [];
  let d = new Date(winStart);
  while (d <= winEnd) {
    const p = (d - winStart) / totalMs * 100;
    const label = ganttScale === 'mes'
      ? monthNames[d.getMonth()].slice(0,3)
      : d.getDate() + '/' + (d.getMonth()+1);
    ticks.push({ p: p.toFixed(2), label });
    d = new Date(d); d.setDate(d.getDate() + tickStep);
  }

  // ── Build HTML using a SINGLE grid div for both header and rows ──
  // Architecture:
  //   .gantt-outer: display:flex on each row → [name 160px fixed] [.gantt-grid flex:1]
  //   .gantt-grid is position:relative, shared reference for ALL % positions
  //   Today line and task markers both use left:X% inside .gantt-grid
  //   The header tick row is ALSO a .gantt-grid so ticks align perfectly

  const NAME_W = 160;

  // Header row
  let html = '<div style="display:flex;margin-bottom:6px;align-items:stretch">';
  html += '<div style="width:' + NAME_W + 'px;flex-shrink:0"></div>';
  html += '<div style="flex:1;position:relative;height:24px;border-bottom:1px solid var(--border-soft)" id="gantt-header-track">';
  // Ticks
  ticks.forEach(t => {
    html += '<div style="position:absolute;left:' + t.p + '%;transform:translateX(-50%);font-size:9px;color:var(--text-dim);font-family:JetBrains Mono,monospace;white-space:nowrap;top:4px">' + t.label + '</div>';
  });
  // Today marker in header
  if (todayP >= 0 && todayP <= 100) {
    html += '<div style="position:absolute;left:' + todayP.toFixed(2) + '%;top:0;bottom:0;width:2px;background:#EF4444;z-index:4">';
    html += '<div style="position:absolute;top:2px;left:4px;font-size:8px;color:#EF4444;font-family:monospace;font-weight:700;white-space:nowrap">hoje</div>';
    html += '</div>';
  }
  html += '</div></div>';

  // Task rows — all share the same track width reference
  active.forEach((t, i) => {
    const color = ganttColors[i % ganttColors.length];
    // Parse YYYY-MM-DD as local midnight (avoid UTC offset shifting the day)
    const dueParts = t.due.split('-');
    const dueDate = new Date(parseInt(dueParts[0]), parseInt(dueParts[1])-1, parseInt(dueParts[2]));
    dueDate.setHours(0,0,0,0);
    const dueP    = pct(dueDate);
    const isOverdue = dueDate < today && t.col !== 'done';
    const isDone    = t.col === 'done';
    const barColor  = isDone ? '#10B981' : isOverdue ? '#EF4444' : color;
    const progress  = t.progress || 0;
    const inView    = dueDate >= winStart && dueDate <= winEnd;
    const outLeft   = dueDate < winStart;
    const outRight  = dueDate > winEnd;

    html += '<div style="display:flex;align-items:center;margin-bottom:8px;cursor:pointer" onclick="editTask(' + t.id + ')">';
    html += '<div class="gantt-row-name" style="width:' + NAME_W + 'px;min-width:' + NAME_W + 'px;max-width:' + NAME_W + 'px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + escHtml(t.title) + '">' + escHtml(t.title) + '</div>';

    // The track — same flex:1 as the header, so same rendered width
    html += '<div style="flex:1;position:relative;height:22px;background:var(--bg);border-radius:4px;overflow:visible">';

    // Today line inside track — same left% as in header
    if (todayP >= 0 && todayP <= 100) {
      html += '<div style="position:absolute;left:' + todayP.toFixed(2) + '%;top:0;bottom:0;width:2px;background:rgba(239,68,68,0.55);z-index:5;pointer-events:none"></div>';
    }

    if (inView) {
      // Progress bar: from 0 to dueP, filled by progress%
      html += '<div style="position:absolute;left:0;top:4px;height:14px;width:' + dueP.toFixed(2) + '%;background:' + barColor + '15;border-radius:3px;overflow:hidden">';
      html += '<div style="height:100%;width:' + progress + '%;background:' + barColor + '40;border-radius:3px 0 0 3px"></div>';
      html += '</div>';
      // Deadline marker: solid vertical line at exact due date
      html += '<div style="position:absolute;left:' + dueP.toFixed(2) + '%;top:0;bottom:0;width:2px;background:' + barColor + ';border-radius:1px;z-index:6"></div>';
      // Label — pinned left of marker when near left edge, right when near right edge
      var labelAlign = dueP < 15 ? 'left:' + (dueP+0.5).toFixed(2) + '%'
                     : dueP > 85 ? 'right:' + (100-dueP+0.5).toFixed(2) + '%'
                     : 'left:' + dueP.toFixed(2) + '%;transform:translateX(-50%)';
      html += '<div style="position:absolute;' + labelAlign + ';top:1px;font-size:9px;font-weight:700;color:' + barColor + ';white-space:nowrap;z-index:7">';
      html += fmtDate(t.due) + (isOverdue ? ' ⚠' : '') + (isDone ? ' ✓' : '');
      html += '</div>';
    } else {
      // Out of view
      const side = outLeft ? 'left:2px' : 'right:2px';
      const arrow = outLeft ? '◀ ' : '';
      const arrowR = outRight ? ' ▶' : '';
      html += '<div style="position:absolute;' + side + ';top:50%;transform:translateY(-50%);font-size:9px;color:var(--text-dim);white-space:nowrap">';
      html += arrow + fmtDate(t.due) + arrowR;
      html += '</div>';
    }

    html += '</div>'; // track
    html += '</div>'; // row
  });

  body.innerHTML = html;
}

const dayNames   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${monthNames[calMonth]} ${calYear}`;
  document.getElementById('cal-day-names').innerHTML = dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();

  let cells = '';
  for (let i=firstDay-1;i>=0;i--)
    cells += `<div class="cal-cell other-month"><span class="cal-day-num">${prevDays-i}</span></div>`;

  for (let d=1;d<=daysInMonth;d++) {
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const key = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const dayEvts   = [...events.filter(e=>e.date===key), ...(gcalState.googleEvents||[]).filter(e=>e.date===key)];
    const dayTasks  = getTasksForDate(key);
    const allDots   = [
      ...dayEvts.slice(0,3).map(e=>`<div class="cal-dot" style="background:${e.color}"></div>`),
      ...dayTasks.slice(0,2).map(()=>`<div class="cal-dot" style="background:var(--amber);border:1px solid var(--amber)"></div>`)
    ];
    const dots = allDots.slice(0,5).join('');
    cells += `<div class="cal-cell${isToday?' today':''}" onclick="showDayEvents('${key}')">
      <span class="cal-day-num">${d}</span>
      ${dots?`<div class="cal-dots">${dots}</div>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = cells;
  showDayEvents(`${calYear}-${pad(calMonth+1)}-${pad(today.getDate())}`);
}

function showDayEvents(dateKey) {
  const localEvts  = events.filter(e=>e.date===dateKey);
  const gEvts      = (gcalState.googleEvents||[]).filter(e=>e.date===dateKey);
  const dayEvts    = [...localEvts, ...gEvts].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const dayTasks = getTasksForDate(dateKey);
  const d = new Date(dateKey+'T12:00:00');
  const label = d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const el = document.getElementById('event-list');
  const total = dayEvts.length + dayTasks.length;
  el.innerHTML = `
    <div class="section-header" style="margin-bottom:12px">
      <span class="section-title">${label}</span>
      <span class="count-pill">${total}</span>
    </div>
    ${dayEvts.length ? dayEvts.map(ev=>`
      <div class="event-item" style="position:relative">
        <div class="event-time-col">
          <span class="event-time">${ev.time||'—'}</span>
          <div class="event-bar" style="background:${ev.color}"></div>
        </div>
        <div style="flex:1">
          <div class="event-name">${escHtml(ev.title)}</div>
          <div class="event-detail">${ev.location?escHtml(ev.location)+' · ':''}${ev.duration?ev.duration+'min':''}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;align-items:center">
          ${ev.fromGoogle ? '<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(59,130,246,0.15);color:#93C5FD;border:1px solid rgba(59,130,246,0.3)">G</span>' : ''}
          ${ev.fromGoogle
            ? '<button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:10px" onclick="editGoogleEvent(\''+ev.googleId+'\',\''+escHtml(ev.title)+'\',\''+ev.date+'\',\''+ev.time+'\','+ev.duration+',\''+escHtml(ev.location||'')+'\')">✏️</button>'
            : '<button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:10px" onclick="editEvent('+ev.id+')">✏️</button>'}
          ${ev.fromGoogle
            ? '<button class="btn btn-danger btn-sm" style="padding:2px 6px;font-size:10px" onclick="gcalDeleteEvent(\''+ev.googleId+'\')">✕</button>'
            : '<button class="btn btn-danger btn-sm" style="padding:2px 6px;font-size:10px" onclick="deleteEvent('+ev.id+')">✕</button>'}
        </div>
      </div>`).join('') : ''}
    ${dayTasks.length ? `
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--amber);padding:8px 0 4px">📋 Prazos de tarefas</div>
      ${dayTasks.map(t=>`
        <div class="event-item" onclick="editTask(${t.id});switchView('kanban',document.querySelector('.sidebar .nav-btn:nth-child(2)'))" style="cursor:pointer">
          <div class="event-time-col">
            <span class="event-time">prazo</span>
            <div class="event-bar" style="background:var(--amber)"></div>
          </div>
          <div>
            <div class="event-name">${escHtml(t.title)}</div>
            <div class="event-detail">${escHtml(t.tag||'')} · ${escHtml(kanbanCols.find(c=>c.id===t.col)?.name||t.col)} · ${t.priority}</div>
          </div>
        </div>`).join('')}` : ''}
    ${!dayEvts.length && !dayTasks.length ? '<p style="color:var(--text-dim);font-size:12px;padding:8px 0">Nenhum evento ou prazo neste dia.</p>' : ''}
    <button class="btn btn-ghost btn-sm" style="margin-top:10px;width:100%" onclick="openEventModal(null,null);document.getElementById('event-date').value='${dateKey}'">+ Novo evento neste dia</button>`;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth>11){calMonth=0;calYear++;}
  if (calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
  if (gcalState.connected) gcalFetchEvents();
}

function editGoogleEvent(googleId, title, date, time, duration, location) {
  document.getElementById('event-origin-id').value = '';
  document.getElementById('event-title').value = title;
  document.getElementById('event-date').value = date;
  document.getElementById('event-time').value = time||'';
  document.getElementById('event-duration').value = duration||60;
  document.getElementById('event-location').value = location||'';
  document.getElementById('event-recur').value = 'nunca';
  document.querySelector('#modal-event .modal-title').textContent = 'Editar Evento (Google)';
  const saveBtn = document.querySelector('#modal-event .btn-primary');
  saveBtn.textContent = 'Salvar no Google';
  saveBtn.onclick = () => {
    const updData = {
      title:    document.getElementById('event-title').value.trim(),
      date:     document.getElementById('event-date').value,
      time:     document.getElementById('event-time').value,
      duration: parseInt(document.getElementById('event-duration').value),

function renderFinance() {
  const entradas = finances.filter(f=>f.type==='entrada');
  const saidas   = finances.filter(f=>f.type==='saida');
  const totalE = entradas.reduce((s,f)=>s+f.value,0);
  const totalS = saidas.reduce((s,f)=>s+f.value,0);
  const saldo  = totalE - totalS;

  document.getElementById('fin-saldo').textContent   = fmtMoney(saldo);
  document.getElementById('fin-entrada').textContent = fmtMoney(totalE);
  document.getElementById('fin-saida').textContent   = fmtMoney(totalS);
  document.getElementById('fin-saldo-delta').textContent   = saldo>=0 ? `↑ saldo positivo` : '↓ saldo negativo';
  document.getElementById('fin-entrada-delta').textContent = `${entradas.length} lançamento${entradas.length!==1?'s':''}`;
  document.getElementById('fin-saida-delta').textContent   = `${saidas.length} lançamento${saidas.length!==1?'s':''}`;

  // Transactions
  const filtFin = filteredFinances();
  document.getElementById('fin-tx-list').innerHTML = activeFiltersPillsHtml() + (filtFin.length
    ? filtFin.map(f=>`
      <div class="tx-row" style="cursor:pointer" onclick="editFinance(${f.id})">
        <div>
          <div class="tx-name">${escHtml(f.desc)}</div>
          <div class="tx-cat">${escHtml(f.category)}${f.source?' · '+escHtml(f.source):''}</div>
        </div>
        <span class="tx-date">${f.date?fmtDate(f.date):'—'}</span>
        <span class="tx-method">${f.method}</span>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
          <span class="tx-amount ${f.type==='entrada'?'pos':'neg'}">${f.type==='entrada'?'+':'-'}${fmtMoney(f.value)}</span>
          <button class="btn btn-danger btn-sm" style="padding:3px 7px;font-size:10px" onclick="event.stopPropagation();deleteFinance(${f.id})">✕</button>
        </div>
      </div>`).join('')
    : '<p style="color:var(--text-dim);font-size:13px;padding:16px">Nenhum lançamento ainda.</p>');

  // Categories
  const catMap = {};
  saidas.forEach(f=>{ catMap[f.category] = (catMap[f.category]||0)+f.value; });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat = cats[0]?.[1] || 1;
  const catColors = ['var(--violet)','var(--amber)','var(--cyan)','var(--blue)','var(--green)','var(--red)'];
  document.getElementById('fin-cats-panel').innerHTML = `
    <div class="section-header" style="margin-bottom:14px"><span class="section-title">Por categoria (saídas)</span></div>
    ${cats.map((c,i)=>`
      <div class="cat-item">
        <div class="cat-row"><span class="cat-name">${c[0]}</span><span class="cat-val">${fmtMoney(c[1])}</span></div>
        <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(c[1]/maxCat*100).toFixed(0)}%;background:${catColors[i%catColors.length]}"></div></div>
      </div>`).join('')}
    ${!cats.length?'<p style="color:var(--text-dim);font-size:12px">Nenhuma saída registrada.</p>':''}`;
}

function renderLists() {
  document.getElementById('lists-grid').innerHTML = lists.map(list=>`
    <div class="list-card">
      <div class="list-head">
        <div class="list-icon" style="background:${list.iconBg};color:${list.iconColor}">${list.icon}</div>
        <span class="list-name">${list.name}</span>
        <span class="list-count">${list.items.filter(i=>!i.done).length}/${list.items.length}</span>
        <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:11px;opacity:0.6" onclick="openTagsModal('${list.id}')" title="Gerenciar tags">🏷️</button>
      </div>
      <div class="list-items">
        ${filteredListItems(list).map(item=>`
          <div class="list-item${item.done?' done':''}">
            <div class="check-box" onclick="toggleListItem('${list.id}',${item.id})">${item.done?'✓':''}</div>
            <span class="list-item-text" onclick="toggleListItem('${list.id}',${item.id})">${escHtml(item.text)}</span>
            ${item.tag?`<span class="list-item-tag" onclick="editListItem('${list.id}',${item.id})" style="cursor:pointer" title="Clique para editar">${escHtml(item.tag)}</span>`:`<span style="font-size:9px;color:var(--text-dim);cursor:pointer" onclick="editListItem('${list.id}',${item.id})" title="Adicionar tag">+tag</span>`}
            <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:10px;opacity:0.5;flex-shrink:0" onclick="editListItem('${list.id}',${item.id})">✏️</button>
            <button class="btn btn-danger btn-sm" style="padding:2px 6px;font-size:10px;flex-shrink:0" onclick="deleteListItem('${list.id}',${item.id})">✕</button>
          </div>`).join('')}
      </div>
      <div class="list-footer">
        <input class="list-add-input" placeholder="+ Adicionar item…"
          onkeydown="addListItem(event,'${list.id}',this)">
      </div>
    </div>`).join('');
}

function toggleListItem(listId, itemId) {
  lsSave();
  const list = lists.find(l=>l.id===listId);
  if (!list) return;
  const item = list.items.find(i=>i.id===itemId);
  if (item) item.done = !item.done;
  renderLists();
}

function addListItem(e, listId, inp) {
  if (e.key !== 'Enter') return;
  const text = inp.value.trim();
  if (!text) return;
  const list = lists.find(l=>l.id===listId);
  if (list) list.items.push({id:nextListItemId++, text, tag:'', done:false});
  lsSave();
  renderLists();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),350); }, 2200);
}


// ══════════════════════════════════════════
//  TAGS SYSTEM
// ══════════════════════════════════════════
let inboxPendingTags = [];
let inboxPriority = 'normal';
const tagColors = ['violet','amber','green','cyan','blue','red'];
let tagColorIdx = 0;

// Global tag registry — id:label:color
let globalTags = [
  {label:'trabalho', color:'violet'},
  {label:'pessoal',  color:'amber'},
  {label:'estudo',   color:'green'},
  {label:'IMPROS',   color:'cyan'},
  {label:'lazer',    color:'blue'},
  {label:'saúde',    color:'red'},
];

function getAllUsedTags() {
  const used = new Set();
  tasks.forEach(t => { if(t.tag) used.add(t.tag); });
  backlog.forEach(i => { if(i.tags) i.tags.forEach(tg=>used.add(tg)); });
  globalTags.forEach(t => used.add(t.label));
  return [...used];
}

function getTagColor(label) {
  const found = globalTags.find(t=>t.label===label);
  return found ? found.color : 'violet';
}

function ensureTag(label) {
  if (!globalTags.find(t=>t.label===label)) {
    globalTags.push({label, color: tagColors[tagColorIdx++ % tagColors.length]});
  }
}

function toggleTagInput() {
  const wrap = document.getElementById('tag-autocomplete');
  if (wrap.style.display !== 'none') { wrap.style.display = 'none'; return; }
  renderTagAutocomplete('');
  wrap.style.display = 'block';
  setTimeout(()=>document.addEventListener('click', closeTagAC, {once:true}), 10);
}

function closeTagAC() {
  const el = document.getElementById('tag-autocomplete');
  if(el) el.style.display = 'none';
}

function renderTagAutocomplete(q) {
  const all = getAllUsedTags().filter(t => !q || t.toLowerCase().includes(q.toLowerCase()));
  const ac = document.getElementById('tag-autocomplete');
  if (!ac) return;
  ac.innerHTML = `
    <div style="display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap">
      ${inboxPendingTags.map(tg=>`
        <span style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;background:var(--violet-glow);border:1px solid var(--violet);font-size:11px;color:var(--violet-light)">
          #${tg} <button onclick="removeInboxTag('${tg}')" style="background:none;border:none;color:inherit;cursor:pointer;font-size:11px">×</button>
        </span>`).join('')}
      ${!inboxPendingTags.length ? '<span style="font-size:11px;color:var(--text-dim)">Nenhuma tag</span>' : ''}
    </div>
    <input id="tag-search-inp" class="form-input" style="border:none;border-bottom:1px solid var(--border-soft);border-radius:0;font-size:12px;padding:8px 12px"
      placeholder="Buscar ou criar tag…" value="${q}"
      oninput="renderTagAutocomplete(this.value)" onkeydown="tagInputKey(event)">
    ${all.slice(0,8).map(tg=>`
      <div class="tag-ac-item" onclick="addInboxTag('${tg}')">
        <div class="tag-color" style="background:var(--${getTagColor(tg)})"></div>
        #${tg}
      </div>`).join('')}
    ${q && !all.find(t=>t===q) ? `
      <div class="tag-ac-item" onclick="addInboxTag('${q}')" style="color:var(--violet-light)">
        + Criar tag "#${q}"
      </div>` : ''}`;
  const inp = document.getElementById('tag-search-inp');
  if (inp) inp.focus();
}

function addInboxTag(label) {
  if (!inboxPendingTags.includes(label)) {
    inboxPendingTags.push(label);
    ensureTag(label);
  }
  renderTagAutocomplete('');
}

function removeInboxTag(label) {
  inboxPendingTags = inboxPendingTags.filter(t=>t!==label);
  renderTagAutocomplete('');
}

function tagInputKey(e) {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) { addInboxTag(val); e.target.value = ''; renderTagAutocomplete(''); }
    e.preventDefault();
  }
  if (e.key === 'Escape') closeTagAC();
}

function cyclePriority() {
  const opts = ['normal','alta','urgente'];
  const idx = opts.indexOf(inboxPriority);
  inboxPriority = opts[(idx+1) % opts.length];
  const labels = {normal:'', alta:'🔺 Alta', urgente:'🔴 Urgente'};
  const btn = document.getElementById('priority-btn');
  const lbl = document.getElementById('inbox-priority-label');
  if (btn) btn.style.color = inboxPriority==='urgente'?'var(--red)':inboxPriority==='alta'?'var(--amber)':'';
  if (lbl) lbl.textContent = labels[inboxPriority];
}

// ── Override addToBacklog to include tags/priority ──
function addToBacklogFull() {
  const inp = document.getElementById('inbox-input');
  const text = inp.value.trim();
  if (!text) return;
  const item = {id: nextBacklogId++, text, time:'agora', tags:[...inboxPendingTags], priority: inboxPriority};
  backlog.unshift(item);
  inp.value = '';
  inboxPendingTags = [];
  inboxPriority = 'normal';
  const btn = document.getElementById('priority-btn');
  const lbl = document.getElementById('inbox-priority-label');
  if (btn) btn.style.color = '';
  if (lbl) lbl.textContent = '';
  closeTagAC();
  lsSave();
  renderBacklog();
}
